name: Build and Test

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  macos:
    name: Build macOS app
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Test archive core
        run: swift test --configuration release

      - name: Build Release
        run: |
          xcodebuild \
            -project PakScape.xcodeproj \
            -scheme PakScape \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO

      - name: Package App
        run: |
          APP_PATH="build/Build/Products/Release/PakScape.app"
          DMG_NAME="PakScape.dmg"
          STAGING_DIR="dmg_staging"

          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found at $APP_PATH"
            exit 1
          fi

          rm -rf "$STAGING_DIR"
          mkdir "$STAGING_DIR"
          ditto "$APP_PATH" "$STAGING_DIR/PakScape.app"
          ln -s /Applications "$STAGING_DIR/Applications"

          hdiutil create "$DMG_NAME" \
            -volname "PakScape" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: PakScape
          path: PakScape.dmg
          retention-days: 14

  windows:
    name: Build and test Windows app
    runs-on: windows-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PakStudio.sln

      - name: Build
        run: dotnet build PakStudio.sln --configuration Release --no-restore --maxcpucount:1

      - name: Test
        run: dotnet run --project PakStudio.Tests/PakStudio.Tests.csproj --configuration Release --no-build

  linux:
    name: Build Ubuntu app (${{ matrix.architecture }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            runtime: linux-x64
            architecture: amd64
          - runner: ubuntu-24.04-arm
            runtime: linux-arm64
            architecture: arm64

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore linux/PakScape.Linux.slnx

      - name: Build
        run: dotnet build linux/PakScape.Linux.slnx --configuration Release --no-restore --maxcpucount:1

      - name: Test portable archive core
        run: dotnet run --project windows/PakStudio.Tests/PakStudio.Tests.csproj --configuration Release --no-build

      - name: Test Linux services
        run: dotnet run --project linux/PakScape.Linux.Tests/PakScape.Linux.Tests.csproj --configuration Release --no-build

      - name: Build Debian package
        run: linux/packaging/build-deb.sh 1.0.1 ${{ matrix.runtime }}

      - name: Inspect Debian package
        run: dpkg-deb --info linux/artifacts/pakscape_1.0.1_${{ matrix.architecture }}.deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: PakScape-Ubuntu-${{ matrix.architecture }}
          path: |
            linux/artifacts/pakscape_1.0.1_${{ matrix.architecture }}.deb
            linux/artifacts/pakscape_1.0.1_${{ matrix.architecture }}.tar.gz
          if-no-files-found: error
          retention-days: 14
